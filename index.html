<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dwell — Work & Study</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:    #f0ece0;
  --paper-2:  #e8e2d4;
  --paper-3:  #ddd7c8;
  --ink:      #1e1a14;
  --ink-2:    #3d3528;
  --ink-3:    #6b5f4e;
  --ink-4:    #9c8e7c;
  --forest:   #2e5c3e;
  --ember:    #8b2a1a;
  --gold:     #9a7c3f;
  --slate:    #3a4f6b;
  --plum:     #5c3d6b;
  --teal:     #2e6b6b;
  --border:   rgba(30,26,20,.12);
  --shadow:   rgba(30,26,20,.18);

  /* space type colors */
  --c-library:  #3a4f6b;
  --c-cafe:     #7a4a2a;
  --c-cowork:   #2e5c3e;
  --c-campus:   #5c3d6b;
  --c-quiet:    #4a6b5a;
  --c-studio:   #6b4a2e;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--ink);
  font-family: 'DM Mono', monospace;
  color: var(--ink);
  overflow: hidden;
  width: 100vw;
  height: 100dvh;
  user-select: none;
}

/* ── MAP BACKGROUND ──────────────────────────────── */
#map-wrap {
  position: absolute;
  inset: 0;
  background: var(--paper);
  overflow: hidden;
}

#map-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Cartographic grid lines */
.grid-line { stroke: var(--ink); stroke-opacity: .06; }
.major-road { stroke: var(--paper-3); stroke-opacity: .9; }
.minor-road { stroke: var(--paper-3); stroke-opacity: .55; }
.block { fill: var(--paper-2); stroke: none; }
.water { fill: #ccd9e8; stroke: none; }
.park  { fill: #d4e0d0; stroke: none; }
.label { fill: var(--ink-4); font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: .04em; text-anchor: middle; }
.district-label { fill: var(--ink-3); font-family: 'EB Garamond', serif; font-style: italic; font-size: 11px; letter-spacing: .06em; text-anchor: middle; opacity: .7; }

/* ── PINS LAYER ──────────────────────────────────── */
#pins-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.pin {
  position: absolute;
  transform: translate(-50%, -100%);
  pointer-events: all;
  cursor: pointer;
  transition: transform .15s ease, filter .15s ease;
  z-index: 10;
}
.pin:hover, .pin.active {
  transform: translate(-50%, -100%) scale(1.18);
  filter: drop-shadow(0 4px 12px rgba(30,26,20,.35));
  z-index: 50;
}

.pin-body {
  width: 30px;
  height: 38px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pin-drop {
  width: 28px;
  height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid rgba(255,255,255,.3);
  box-shadow: 1px 2px 8px rgba(30,26,20,.28);
  position: relative;
}
.pin-drop::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50% 50% 50% 0;
  background: rgba(255,255,255,.15);
}

.pin-icon {
  transform: rotate(45deg);
  font-size: 13px;
  position: relative;
  z-index: 1;
}

.pin-stem {
  width: 2px;
  height: 10px;
  background: currentColor;
  opacity: .45;
  margin: 0 auto;
  border-radius: 0 0 2px 2px;
}

/* Type colors */
.pin[data-type="library"]  .pin-drop { background: linear-gradient(135deg, #4a5f7b, #2e3f5a); color: #b8c8e0; }
.pin[data-type="library"]  .pin-stem { color: #2e3f5a; }
.pin[data-type="cafe"]     .pin-drop { background: linear-gradient(135deg, #8a5a38, #5e3a20); color: #f0d8b8; }
.pin[data-type="cafe"]     .pin-stem { color: #5e3a20; }
.pin[data-type="cowork"]   .pin-drop { background: linear-gradient(135deg, #3e6c4e, #254a32); color: #b8d8c0; }
.pin[data-type="cowork"]   .pin-stem { color: #254a32; }
.pin[data-type="campus"]   .pin-drop { background: linear-gradient(135deg, #6c4d7b, #462e5a); color: #d8c0e8; }
.pin[data-type="campus"]   .pin-stem { color: #462e5a; }
.pin[data-type="quiet"]    .pin-drop { background: linear-gradient(135deg, #5a7a6a, #3a5848); color: #c0d8d0; }
.pin[data-type="quiet"]    .pin-stem { color: #3a5848; }
.pin[data-type="studio"]   .pin-drop { background: linear-gradient(135deg, #7a5a3a, #5a3a20); color: #e0c8a8; }
.pin[data-type="studio"]   .pin-stem { color: #5a3a20; }

/* Density indicator ring */
.pin-ring {
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  opacity: .2;
  animation: pulse-ring 3s ease-in-out infinite;
}

@keyframes pulse-ring {
  0%, 100% { transform: scale(1); opacity: .2; }
  50%       { transform: scale(1.12); opacity: .08; }
}

.pin[data-density="high"] .pin-ring { opacity: .3; }
.pin[data-density="low"]  .pin-ring { display: none; }

/* Occupancy dot */
.pin-occ {
  position: absolute;
  top: -3px;
  right: -3px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 1.5px solid var(--paper);
}
.occ-low    { background: #4a8c5a; }
.occ-medium { background: #b88c3a; }
.occ-high   { background: #8b3a2a; }

/* ── HEADER ──────────────────────────────────────── */
#header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 14px 16px 10px;
  background: linear-gradient(180deg, rgba(240,236,224,.96) 70%, rgba(240,236,224,0) 100%);
  backdrop-filter: blur(4px);
}

.header-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.wordmark {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 22px;
  letter-spacing: -.01em;
  color: var(--ink);
  flex-shrink: 0;
  line-height: 1;
}
.wordmark span { color: var(--forest); }

.search-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: 10px;
  color: var(--ink-4);
  font-size: 14px;
  pointer-events: none;
}
.search-in {
  width: 100%;
  background: var(--paper-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px 7px 30px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.search-in::placeholder { color: var(--ink-4); }
.search-in:focus { border-color: rgba(30,26,20,.3); }

.ar-btn {
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 6px;
  padding: 7px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .05em;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.ar-btn:hover { background: var(--ink-2); }

/* ── FILTER STRIP ────────────────────────────────── */
#filters {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 8px 0 2px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
#filters::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.5);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .04em;
  color: var(--ink-3);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.chip.on {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.chip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .6;
}
.chip.on .chip-dot { opacity: .8; }

/* ── BOTTOM SHEET ────────────────────────────────── */
#sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: var(--paper);
  border-radius: 16px 16px 0 0;
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 40px rgba(30,26,20,.12);
  max-height: 82dvh;
  display: flex;
  flex-direction: column;
  transform: translateY(calc(100% - 56px));
  transition: transform .32s cubic-bezier(.32,.72,0,1);
}
#sheet.peek { transform: translateY(calc(100% - 56px)); }
#sheet.half { transform: translateY(calc(100% - 52dvh)); }
#sheet.full { transform: translateY(0); }

.sheet-handle-wrap {
  padding: 10px 0 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  flex-shrink: 0;
}
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--ink-4);
  border-radius: 2px;
  opacity: .35;
}
.sheet-count {
  font-size: 10px;
  color: var(--ink-4);
  letter-spacing: .06em;
}

.sheet-detail {
  flex-shrink: 0;
  padding: 0 16px 12px;
  border-bottom: 1px solid var(--border);
  display: none;
}
.sheet-detail.visible { display: block; }

.detail-type-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 3px;
  font-size: 9px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--paper);
  margin-bottom: 8px;
}
.detail-name {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 20px;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 4px;
}
.detail-address {
  font-size: 10px;
  color: var(--ink-3);
  margin-bottom: 10px;
  letter-spacing: .03em;
}
.detail-desc {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.6;
  margin-bottom: 12px;
}

.detail-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.meta-item {
  background: var(--paper-2);
  border-radius: 6px;
  padding: 8px 10px;
}
.meta-label {
  font-size: 8px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 3px;
}
.meta-value {
  font-size: 11px;
  color: var(--ink);
  font-weight: 500;
}

.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 12px;
}
.detail-tag {
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: .04em;
}

.occ-bar-wrap { margin-bottom: 12px; }
.occ-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--ink-4);
  margin-bottom: 5px;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.occ-bar-track {
  height: 4px;
  background: var(--paper-3);
  border-radius: 2px;
  overflow: hidden;
}
.occ-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .6s ease;
}

.detail-actions {
  display: flex;
  gap: 8px;
}
.action-btn {
  flex: 1;
  padding: 9px;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .06em;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  border: 1px solid var(--border);
  background: var(--paper-2);
  color: var(--ink);
}
.action-btn.primary {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.sheet-list {
  overflow-y: auto;
  flex: 1;
  padding: 6px 0 env(safe-area-inset-bottom, 0);
  scrollbar-width: thin;
  scrollbar-color: var(--paper-3) transparent;
}

.list-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
}
.list-item:hover, .list-item.active { background: var(--paper-2); }

.list-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.list-body { flex: 1; min-width: 0; }
.list-name {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--ink);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.list-sub {
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: .04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.list-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.list-occ {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--paper);
  letter-spacing: .04em;
}
.list-noise {
  font-size: 9px;
  color: var(--ink-4);
}

/* ── LEGEND ──────────────────────────────────────── */
#legend {
  position: absolute;
  top: 100px;
  right: 16px;
  z-index: 100;
  background: rgba(240,236,224,.92);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  box-shadow: 0 2px 16px var(--shadow);
  backdrop-filter: blur(8px);
  min-width: 130px;
  display: none;
}
#legend.visible { display: block; }

.legend-title {
  font-size: 8px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 8px;
}
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-label { font-size: 10px; color: var(--ink-2); }

/* ── TRAY BUTTONS ────────────────────────────────── */
#tray {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 150;
  padding: 8px 12px calc(env(safe-area-inset-bottom, 0px) + 10px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: linear-gradient(0deg, rgba(240,236,224,.97) 70%, transparent 100%);
  backdrop-filter: blur(6px);
  pointer-events: none;
}
#sheet.half ~ #tray,
#sheet.full ~ #tray { display: none; }

.tray-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: background .12s;
  pointer-events: all;
}
.tray-btn:hover { background: var(--paper-2); }
.tray-btn .ic {
  font-size: 18px;
  line-height: 1;
}
.tray-btn span:last-child {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: .04em;
}

.legend-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: background .12s;
  pointer-events: all;
}
.legend-btn:hover { background: var(--paper-2); }
.legend-btn .ic { font-size: 18px; line-height: 1; }
.legend-btn span:last-child {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: .04em;
}

/* ── TOOLTIP ─────────────────────────────────────── */
.pin-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--paper);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 10px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  z-index: 200;
  letter-spacing: .03em;
  min-width: 120px;
  text-align: center;
}
.pin-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--ink);
}
.pin:hover .pin-tooltip { opacity: 1; }

/* ── TOAST ───────────────────────────────────────── */
#toast {
  position: absolute;
  top: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(-12px);
  background: var(--ink);
  color: var(--paper);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 11px;
  letter-spacing: .04em;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  z-index: 999;
  transition: opacity .2s, transform .2s;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── ME DOT ──────────────────────────────────────── */
.me {
  position: absolute;
  width: 14px; height: 14px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 20;
}
.me-ring {
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: rgba(46,92,62,.15);
  animation: me-pulse 2.5s ease-in-out infinite;
}
.me-dot {
  position: absolute;
  inset: 2px;
  border-radius: 50%;
  background: var(--forest);
  border: 2px solid var(--paper);
  box-shadow: 0 1px 6px rgba(30,26,20,.3);
}
@keyframes me-pulse {
  0%, 100% { transform: scale(1); opacity: .4; }
  50% { transform: scale(1.6); opacity: .15; }
}
</style>
</head>
<body>

<!-- MAP -->
<div id="map-wrap">
  <svg id="map-svg" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <!-- city blocks (SF-inspired grid) -->
    <rect class="block" x="0" y="0" width="400" height="700"/>

    <!-- parks -->
    <rect class="park" x="20" y="80" width="60" height="55" rx="3"/>
    <rect class="park" x="260" y="120" width="90" height="70" rx="3"/>
    <rect class="park" x="140" y="380" width="45" height="40" rx="3"/>
    <rect class="park" x="310" y="460" width="55" height="65" rx="3"/>

    <!-- water suggestion -->
    <rect class="water" x="330" y="0" width="70" height="200" rx="2"/>
    <path class="water" d="M0,640 Q60,620 120,645 T240,635 T400,640 L400,700 L0,700 Z"/>

    <!-- blocks -->
    <rect class="block" x="18" y="148" width="52" height="30" rx="1"/>
    <rect class="block" x="80" y="148" width="65" height="30" rx="1"/>
    <rect class="block" x="155" y="148" width="55" height="30" rx="1"/>
    <rect class="block" x="220" y="148" width="30" height="30" rx="1"/>
    <rect class="block" x="18" y="190" width="52" height="38" rx="1"/>
    <rect class="block" x="80" y="190" width="65" height="38" rx="1"/>
    <rect class="block" x="155" y="190" width="55" height="38" rx="1"/>
    <rect class="block" x="220" y="190" width="30" height="38" rx="1"/>
    <rect class="block" x="260" y="205" width="50" height="38" rx="1"/>
    <rect class="block" x="18" y="245" width="52" height="42" rx="1"/>
    <rect class="block" x="80" y="245" width="65" height="42" rx="1"/>
    <rect class="block" x="155" y="245" width="55" height="42" rx="1"/>
    <rect class="block" x="220" y="245" width="30" height="42" rx="1"/>
    <rect class="block" x="260" y="255" width="50" height="42" rx="1"/>
    <rect class="block" x="18" y="300" width="52" height="35" rx="1"/>
    <rect class="block" x="80" y="300" width="65" height="35" rx="1"/>
    <rect class="block" x="155" y="300" width="55" height="35" rx="1"/>
    <rect class="block" x="260" y="310" width="50" height="35" rx="1"/>
    <rect class="block" x="18" y="350" width="52" height="25" rx="1"/>
    <rect class="block" x="80" y="350" width="65" height="25" rx="1"/>
    <rect class="block" x="200" y="350" width="50" height="25" rx="1"/>
    <rect class="block" x="260" y="355" width="50" height="25" rx="1"/>

    const matchType   = activeFilter === 'all' || s.type === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || s.name.toLowerCase().includes(q) || s.address.toLowerCase().includes(q) || s.tags.some(t => t.toLowerCase().includes(q));
    return matchType && matchSearch;
  });
}

// ── PINS ────────────────────────────────────────────
function renderPins() {
  const layer = document.getElementById('pins-layer');
  layer.innerHTML = '';
  const spaces = filteredSpaces();
  spaces.forEach(s => {
    const t = TYPES[s.type];
    const div = document.createElement('div');
    div.className = 'pin' + (activeSpace === s.id ? ' active' : '');
    div.dataset.type = s.type;
    div.dataset.density = s.density;
    div.style.left = s.x + '%';
    div.style.top  = s.y + '%';
    div.innerHTML = `
      <div class="pin-body">
        <div class="pin-drop">
          <div class="pin-ring"></div>
          <span class="pin-icon">${t.icon}</span>
          <div class="pin-occ occ-${s.occ}"></div>
        </div>
      </div>
      <div class="pin-stem"></div>
      <div class="pin-tooltip">${s.name}<br><span style="opacity:.6;font-size:9px">${t.label} · ${s.occ === 'low' ? 'Usually quiet' : s.occ === 'medium' ? 'Moderate' : 'Often busy'}</span></div>
    `;
    div.addEventListener('click', () => selectSpace(s.id));
    layer.appendChild(div);
  });
}

// ── LIST ─────────────────────────────────────────────
function renderList() {
  const list   = document.getElementById('sheet-list');
  const spaces = filteredSpaces();
  document.getElementById('sheet-count').textContent = spaces.length + ' work & study space' + (spaces.length !== 1 ? 's' : '');

  list.innerHTML = spaces.map(s => {
    const t = TYPES[s.type];
    return `
    <div class="list-item${activeSpace === s.id ? ' active' : ''}" data-id="${s.id}" onclick="selectSpace(${s.id})">
      <div class="list-icon" style="background:${t.bg}20;border:1px solid ${t.bg}30">${t.icon}</div>
      <div class="list-body">
        <div class="list-name">${s.name}</div>
        <div class="list-sub">${t.label} · ${s.address}</div>
      </div>
      <div class="list-right">
        <span class="list-occ" style="background:${s.occ==='low'?'#4a8c5a':s.occ==='medium'?'#b88c3a':'#8b3a2a'}">${s.occ==='low'?'Quiet':s.occ==='medium'?'Moderate':'Busy'}</span>
        <span class="list-noise" style="font-size:8px">${s.wifi.includes('No wifi') ? '⚡ No wifi' : '◎ Wifi'}</span>
      </div>
    </div>`;
  }).join('');
}

// ── DETAIL ───────────────────────────────────────────
function renderDetail(s) {
  if (!s) { document.getElementById('sheet-detail').className = 'sheet-detail'; return; }
  const t = TYPES[s.type];
  const pct = s.occupancy;
  const barColor = pct < 40 ? '#4a8c5a' : pct < 70 ? '#b88c3a' : '#8b3a2a';

  document.getElementById('sheet-detail').innerHTML = `
    <span class="detail-type-tag" style="background:${t.bg}">${t.icon} ${t.label}</span>
    <div class="detail-name">${s.name}</div>
    <div class="detail-address">${s.address}</div>
    <div class="detail-desc">${s.desc}</div>

    <div class="occ-bar-wrap">
      <div class="occ-bar-label"><span>Typical occupancy</span><span>${pct}%</span></div>
      <div class="occ-bar-track"><div class="occ-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>

    <div class="detail-meta">
      <div class="meta-item">
        <div class="meta-label">Hours</div>
        <div class="meta-value" style="font-size:9px;line-height:1.4">${s.hours}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Noise Level</div>
        <div class="meta-value" style="font-size:9px;line-height:1.4">${s.noise}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Wifi</div>
        <div class="meta-value" style="font-size:9px;line-height:1.4">${s.wifi}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Power</div>
        <div class="meta-value" style="font-size:9px;line-height:1.4">${s.power}</div>
      </div>
    </div>

    <div class="detail-tags">
      ${s.tags.map(tag => `<span class="detail-tag">${tag}</span>`).join('')}
    </div>

    <div class="detail-actions">
      <button class="action-btn" onclick="showToast('Saved ${s.name}')">♡ Save</button>
      <button class="action-btn" onclick="showToast('Directions to ${s.name}')">↗ Directions</button>
      <button class="action-btn primary" onclick="showToast('Check-in at ${s.name}')">✦ Check in</button>
    </div>
  `;
  document.getElementById('sheet-detail').className = 'sheet-detail visible';
}

function selectSpace(id) {
  activeSpace = activeSpace === id ? null : id;
  const s = SPACES.find(sp => sp.id === id);
  renderPins();
  renderList();
  renderDetail(activeSpace ? s : null);
  if (activeSpace) {
    setSheet('half');
    // scroll list to item
    setTimeout(() => {
      const el = document.querySelector(`.list-item[data-id="${id}"]`);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 100);
  }
}

// ── FILTERS ──────────────────────────────────────────
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    activeFilter = chip.dataset.f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    activeSpace = null;
    renderDetail(null);
    renderPins();
    renderList();
  });
});

// ── SEARCH ───────────────────────────────────────────
document.getElementById('search-in').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderPins();
  renderList();
});

// ── SHEET ────────────────────────────────────────────
function setSheet(state) {
  sheetState = state;
  const sheet = document.getElementById('sheet');
  sheet.className = state;
}

function cycleSheet() {
  const next = { peek:'half', half:'full', full:'peek' };
  setSheet(next[sheetState]);
}

document.getElementById('sheet-handle').addEventListener('click', cycleSheet);

// ── LEGEND ───────────────────────────────────────────
function toggleLegend() {
  legendVisible = !legendVisible;
  document.getElementById('legend').className = legendVisible ? 'visible' : '';
}

// ── TOAST ────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── BOOT ─────────────────────────────────────────────
renderPins();
renderList();
setTimeout(() => setSheet('peek'), 800);
</script>
</body>
</html>
